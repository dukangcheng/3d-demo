<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D室内设计效果图 - 3室2厅2卫</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            max-width: 300px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        button {
            padding: 10px 20px;
            background: rgba(74, 74, 74, 0.9);
            color: white;
            border: 2px solid #C4A484;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(196, 164, 132, 0.9);
            color: #4A4A4A;
        }
        h3 { margin: 0 0 10px 0; color: #C4A484; }
        p { margin: 5px 0; font-size: 13px; line-height: 1.5; }
        .highlight { color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>
    <div id="info">
        <h3>🏠 3室2厅2卫 户型设计</h3>
        <p><span class="highlight">主卧室</span> + 独立卫生间</p>
        <p><span class="highlight">次卧室×2</span></p>
        <p><span class="highlight">客厅</span> + <span class="highlight">餐厅</span></p>
        <p><span class="highlight">公共卫生间</span></p>
        <p><span class="highlight">厨房</span></p>
        <hr style="border-color: #C4A484;">
        <p>🖱️ 鼠标操作：旋转/平移/缩放</p>
        <p>🎨 风格：现代简约</p>
    </div>
    
    <div id="controls">
        <button onclick="setView('overview')">全景视图</button>
        <button onclick="setView('living')">客厅</button>
        <button onclick="setView('master')">主卧室</button>
        <button onclick="setView('kitchen')">厨房</button>
        <button onclick="toggleWalls()">墙体显示/隐藏</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // 场景初始化
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xF0F8FF);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 20, 25);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // 光照系统 - 增强对比度
        const ambientLight = new THREE.AmbientLight(0xFFFFFF, 0.7);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xFFFFFF, 1.0);
        mainLight.position.set(20, 30, 20);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 100;
        mainLight.shadow.camera.left = -30;
        mainLight.shadow.camera.right = 30;
        mainLight.shadow.camera.top = 30;
        mainLight.shadow.camera.bottom = -30;
        scene.add(mainLight);
        
        // 补充光源
        const fillLight1 = new THREE.PointLight(0xFFE4B5, 0.6, 50);
        fillLight1.position.set(-10, 8, -10);
        scene.add(fillLight1);
        
        const fillLight2 = new THREE.PointLight(0xFFE4B5, 0.6, 50);
        fillLight2.position.set(10, 8, 10);
        scene.add(fillLight2);
        
        // 材质定义 - 颜色分明
        const wallMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x4A4A4A,  // 深灰色墙体
            metalness: 0.3,
            roughness: 0.7
        });
        
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xC4A484,  // 深棕色地板
            metalness: 0.2,
            roughness: 0.8
        });
        
        const roomFloorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xD2B48C,  // 房间浅色地板
            metalness: 0.2,
            roughness: 0.7
        });
        
        const furnitureMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513,  // 棕色家具
            metalness: 0.1,
            roughness: 0.9
        });
        
        const cabinetMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xDEB887,  // 米色橱柜
            metalness: 0.3,
            roughness: 0.6
        });
        
        const glassMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x87CEEB,
            transparent: true,
            opacity: 0.4,
            metalness: 0.8,
            roughness: 0.1
        });
        
        const doorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xA0522D,
            metalness: 0.2,
            roughness: 0.8
        });
        
        let wallsVisible = true;
        const wallGroups = [];
        
        // 创建墙体
        function createWall(x, y, z, width, height, depth) {
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const wall = new THREE.Mesh(geometry, wallMaterial);
            wall.position.set(x, y, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            return wall;
        }
        
        // 创建门洞
        function createDoorway(x, z, rotation) {
            const doorGroup = new THREE.Group();
            const doorFrame = createWall(x, 1.5, z, 0.2, 3, 1.2);
            doorGroup.add(doorFrame);
            if (rotation === 'y') {
                doorFrame.rotation.y = Math.PI / 2;
            }
            return doorGroup;
        }
        
        // 地板
        const floorGeometry = new THREE.PlaneGeometry(30, 25);
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // 外墙
        const outerWalls = [
            createWall(0, 2, -12.5, 30, 4, 0.3),  // 后墙
            createWall(0, 2, 12.5, 30, 4, 0.3),   // 前墙
            createWall(-15, 2, 0, 0.3, 4, 25),    // 左墙
            createWall(15, 2, 0, 0.3, 4, 25)      // 右墙
        ];
        outerWalls.forEach(wall => {
            scene.add(wall);
            wallGroups.push(wall);
        });
        
        // 内墙 - 房间分隔
        // 主卧隔墙
        const masterWall1 = createWall(-8, 2, -6, 0.2, 4, 13);
        scene.add(masterWall1);
        wallGroups.push(masterWall1);
        
        // 次卧隔墙
        const bedroomWall1 = createWall(8, 2, -6, 0.2, 4, 13);
        scene.add(bedroomWall1);
        wallGroups.push(bedroomWall1);
        
        // 中间走廊墙
        const corridorWall1 = createWall(0, 2, 0, 16, 4, 0.2);
        scene.add(corridorWall1);
        wallGroups.push(corridorWall1);
        
        // 卫生间隔墙
        const bathWall1 = createWall(-8, 2, 6, 0.2, 4, 7);
        scene.add(bathWall1);
        wallGroups.push(bathWall1);
        
        const bathWall2 = createWall(8, 2, 6, 0.2, 4, 7);
        scene.add(bathWall2);
        wallGroups.push(bathWall2);
        
        // 厨房隔墙
        const kitchenWall = createWall(12, 2, 8, 6, 4, 0.2);
        scene.add(kitchenWall);
        wallGroups.push(kitchenWall);
        
        // 客厅区域家具
        // 沙发
        const sofaBase = new THREE.Mesh(new THREE.BoxGeometry(4, 0.8, 1.5), furnitureMaterial);
        sofaBase.position.set(-5, 0.4, 8);
        sofaBase.castShadow = true;
        scene.add(sofaBase);
        
        const sofaBack = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 0.3), furnitureMaterial);
        sofaBack.position.set(-5, 1, 7.4);
        sofaBack.castShadow = true;
        scene.add(sofaBack);
        
        // 茶几
        const coffeeTable = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 1.2), cabinetMaterial);
        coffeeTable.position.set(-5, 0.25, 5);
        coffeeTable.castShadow = true;
        scene.add(coffeeTable);
        
        // 电视柜
        const tvStand = new THREE.Mesh(new THREE.BoxGeometry(3, 0.6, 0.8), furnitureMaterial);
        tvStand.position.set(10, 0.3, 8);
        tvStand.castShadow = true;
        scene.add(tvStand);
        
        // 餐桌
        const diningTable = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.7, 1.5), furnitureMaterial);
        diningTable.position.set(0, 0.35, 5);
        diningTable.castShadow = true;
        scene.add(diningTable);
        
        // 餐椅
        for (let i = 0; i < 4; i++) {
            const chair = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.5), furnitureMaterial);
            const x = i < 2 ? -1.5 : 1.5;
            const z = i % 2 === 0 ? 4 : 6;
            chair.position.set(x, 0.4, z);
            chair.castShadow = true;
            scene.add(chair);
        }
        
        // 主卧室
        const masterBed = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.6, 2), furnitureMaterial);
        masterBed.position.set(-12, 0.3, -8);
        masterBed.castShadow = true;
        scene.add(masterBed);
        
        const masterBedHead = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1, 0.2), furnitureMaterial);
        masterBedHead.position.set(-12, 0.8, -9);
        masterBedHead.castShadow = true;
        scene.add(masterBedHead);
        
        const nightStand1 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.5), cabinetMaterial);
        nightStand1.position.set(-13.5, 0.25, -8);
        nightStand1.castShadow = true;
        scene.add(nightStand1);
        
        const nightStand2 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.5), cabinetMaterial);
        nightStand2.position.set(-10.5, 0.25, -8);
        nightStand2.castShadow = true;
        scene.add(nightStand2);
        
        const wardrobe = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2, 1.5), cabinetMaterial);
        wardrobe.position.set(-13.5, 1, -5);
        wardrobe.castShadow = true;
        scene.add(wardrobe);
        
        // 主卫
        const toilet = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.6), new THREE.MeshStandardMaterial({ color: 0xFFFFFF }));
        toilet.position.set(-12, 0.25, 5);
        toilet.castShadow = true;
        scene.add(toilet);
        
        const sink = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.4), new THREE.MeshStandardMaterial({ color: 0xFFFFFF }));
        sink.position.set(-10, 0.6, 6);
        sink.castShadow = true;
        scene.add(sink);
        
        const shower = new THREE.Mesh(new THREE.BoxGeometry(1, 0.1, 1), glassMaterial);
        shower.position.set(-11, 0.05, 8);
        shower.castShadow = true;
        scene.add(shower);
        
        // 次卧室1
        const bed1 = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 1.8), furnitureMaterial);
        bed1.position.set(12, 0.25, -8);
        bed1.castShadow = true;
        scene.add(bed1);
        
        const desk1 = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.7, 0.6), cabinetMaterial);
        desk1.position.set(13, 0.35, -5);
        desk1.castShadow = true;
        scene.add(desk1);
        
        // 次卧室2
        const bed2 = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 1.8), furnitureMaterial);
        bed2.position.set(5, 0.25, -8);
        bed2.castShadow = true;
        scene.add(bed2);
        
        const desk2 = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.7, 0.6), cabinetMaterial);
        desk2.position.set(6, 0.35, -5);
        desk2.castShadow = true;
        scene.add(desk2);
        
        // 公共卫生间
        const toilet2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.6), new THREE.MeshStandardMaterial({ color: 0xFFFFFF }));
        toilet2.position.set(5, 0.25, 8);
        toilet2.castShadow = true;
        scene.add(toilet2);
        
        const sink2 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.4), new THREE.MeshStandardMaterial({ color: 0xFFFFFF }));
        sink2.position.set(7, 0.6, 8);
        sink2.castShadow = true;
        scene.add(sink2);
        
        // 厨房
        const kitchenCounter = new THREE.Mesh(new THREE.BoxGeometry(5, 0.9, 0.8), cabinetMaterial);
        kitchenCounter.position.set(12, 0.45, 11);
        kitchenCounter.castShadow = true;
        scene.add(kitchenCounter);
        
        const upperCabinet = new THREE.Mesh(new THREE.BoxGeometry(5, 0.8, 0.6), cabinetMaterial);
        upperCabinet.position.set(12, 1.9, 11.2);
        upperCabinet.castShadow = true;
        scene.add(upperCabinet);
        
        const fridge = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.8, 0.8), new THREE.MeshStandardMaterial({ color: 0xC0C0C0, metalness: 0.8, roughness: 0.2 }));
        fridge.position.set(14.5, 0.9, 10);
        fridge.castShadow = true;
        scene.add(fridge);
        
        // 窗户
        const window1 = new THREE.Mesh(new THREE.PlaneGeometry(2, 1.5), glassMaterial);
        window1.position.set(-5, 2, -12.4);
        scene.add(window1);
        
        const window2 = new THREE.Mesh(new THREE.PlaneGeometry(2, 1.5), glassMaterial);
        window2.position.set(5, 2, -12.4);
        scene.add(window2);
        
        const window3 = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), glassMaterial);
        window3.position.set(-12.4, 2, -8);
        window3.rotation.y = Math.PI / 2;
        scene.add(window3);
        
        // 视角切换函数
        function setView(viewName) {
            switch(viewName) {
                case 'overview':
                    camera.position.set(25, 20, 25);
                    camera.lookAt(0, 0, 0);
                    break;
                case 'living':
                    camera.position.set(0, 8, 15);
                    camera.lookAt(0, 2, 0);
                    break;
                case 'master':
                    camera.position.set(-12, 8, -12);
                    camera.lookAt(-12, 2, -8);
                    break;
                case 'kitchen':
                    camera.position.set(12, 8, 15);
                    camera.lookAt(12, 2, 10);
                    break;
            }
        }
        
        // 墙体显示/隐藏
        function toggleWalls() {
            wallsVisible = !wallsVisible;
            wallGroups.forEach(wall => {
                wall.visible = wallsVisible;
            });
        }
        
        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
